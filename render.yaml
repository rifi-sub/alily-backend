services:
  - type: web
    name: alily-backend
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev --legacy-peer-deps && npm run build
    startCommand: NODE_ENV=production npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://your-vercel-domain.vercel.app
      - key: PORT
        value: 10000
